name: automata-visualiser
version: 0.1.0

dependencies:
- base >= 4.7 && < 5
- mtl
- text
- blaze-svg
- blaze-markup
- random
- latex-svg-image
- regex-tdfa

ghc-options:
- -Wall
- -Wcompat
- -Widentities
- -Wincomplete-record-updates
- -Wincomplete-uni-patterns
- -Wmissing-home-modules
- -Wpartial-fields
- -Wredundant-constraints
- -Wno-orphans
- -Wno-missing-export-lists

language: GHC2021

library:
  source-dirs:
    - src
